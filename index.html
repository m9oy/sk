<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be come</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#080808;
  color:#fff;
  font-family:'Tajawal',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* النص */
.title{
  font-family:'Cinzel',serif;
  font-size:clamp(3rem,8vw,6rem);
  font-weight:900;
  text-align:center;
  background:linear-gradient(135deg,#fff,#777,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:30px;
}

/* تحميل (داخل الصفحة وليس شاشة كاملة) */
.loader-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-top:10px;
}

.loader{
  width:50px;
  height:50px;
  border:3px solid rgba(255,255,255,0.2);
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.loading-text{
  color:#aaa;
  font-size:14px;
}
</style>
</head>

<body>

<div style="text-align:center;">
  <div class="title">...Soon</div>

  <!-- شاشة التحميل تحت النص -->
  <div class="loader-wrapper">
    <div class="loader"></div>
    <div class="loading-text">
    ...Download</div>
  </div>
</div>

</body>
</html>
