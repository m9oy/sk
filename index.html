<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelArc — تصاميم ديسكورد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --black: #080808;
    --white: #f5f5f5;
    --silver: #c8c8c8;
    --silver-dim: #888;
    --border: rgba(200,200,200,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    overflow-x: hidden;
  }

  /* ── ANIMATED BACKGROUND ── */
  #bg-canvas {
    position: fixed; inset:0;
    z-index: 0; pointer-events: none;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:1; opacity:0.35;
  }

  /* ── NAV ── */
  nav {
    position:fixed; top:0; width:100%; z-index:1000;
    padding:0 5%;
    display:flex; align-items:center; justify-content:space-between;
    height:72px;
    background: rgba(8,8,8,0.88);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family:'Cinzel',serif; font-size:1.4rem; font-weight:900;
    letter-spacing:0.15em;
    background: linear-gradient(135deg,#fff 0%,#aaa 50%,#fff 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  .nav-links { display:flex; gap:2.5rem; list-style:none; }
  .nav-links a {
    text-decoration:none; color:var(--silver-dim);
    font-size:0.9rem; font-weight:500; letter-spacing:0.08em;
    transition:color 0.3s; position:relative;
  }
  .nav-links a::after {
    content:''; position:absolute; bottom:-4px; right:0;
    width:0; height:1px; background:var(--silver); transition:width 0.3s;
  }
  .nav-links a:hover { color:var(--white); }
  .nav-links a:hover::after { width:100%; }

  /* ── HAMBURGER 3 DOTS ── */
  .hamburger {
    display:none; flex-direction:column;
    gap:5px; cursor:pointer; padding:8px; z-index:1100;
    align-items:center;
  }
  .hamburger .dot {
    width:5px; height:5px;
    background: var(--silver);
    border-radius: 50%;
    transition: transform 0.3s, background 0.3s;
  }
  .hamburger:hover .dot { background: var(--white); }
  .hamburger.open .dot:nth-child(1) { transform: translateY(10px) scale(1.2); }
  .hamburger.open .dot:nth-child(2) { transform: scale(0.6); opacity:0.4; }
  .hamburger.open .dot:nth-child(3) { transform: translateY(-10px) scale(1.2); }

  /* Mobile menu */
  .mobile-menu {
    position:fixed; top:72px; left:0; right:0;
    background: rgba(8,8,8,0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding:2rem 5%; z-index:999;
    flex-direction:column; gap:1.5rem;
    transform:translateY(-10px); opacity:0;
    transition: transform 0.35s ease, opacity 0.35s ease;
    display:none;
  }
  .mobile-menu.open { display:flex; transform:translateY(0); opacity:1; }
  .mobile-menu a {
    text-decoration:none; color:var(--silver);
    font-size:1.1rem; font-weight:500;
    padding:0.5rem 0; border-bottom:1px solid var(--border);
    transition:color 0.2s;
  }
  .mobile-menu a:hover { color:var(--white); }

  @media (max-width:768px) {
    .nav-links { display:none; }
    .hamburger { display:flex; }
  }

  /* ── HERO ── */
  #hero {
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; text-align:center;
    padding:0 5%; position:relative; z-index:2; overflow:hidden;
  }

  .hero-grid-bg {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(200,200,200,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,200,200,0.04) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black, transparent);
    z-index:0;
  }

  @keyframes fadeDown { to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { to { opacity:1; transform:translateY(0); } }

  .hero-badge {
    display:inline-flex; align-items:center; gap:0.6rem;
    border:1px solid var(--border);
    padding:0.4rem 1.2rem; border-radius:100px;
    font-size:0.75rem; letter-spacing:0.2em;
    color:var(--silver-dim); text-transform:uppercase;
    margin-bottom:2rem; background:rgba(255,255,255,0.02);
    animation:fadeDown 0.8s ease forwards; opacity:0; transform:translateY(-20px);
    position:relative; z-index:1;
  }

  .hero-title {
    font-family:'Cinzel',serif;
    font-size:clamp(3rem,8vw,7rem); font-weight:900;
    line-height:0.9; letter-spacing:-0.02em; margin-bottom:1.5rem;
    opacity:0; transform:translateY(30px);
    animation:fadeUp 0.9s 0.2s ease forwards;
    position:relative; z-index:1;
  }
  .hero-title span {
    display:block;
    background:linear-gradient(135deg,#ffffff 0%,#777 60%,#ffffff 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .hero-title .outline {
    -webkit-text-stroke:1px rgba(200,200,200,0.3); -webkit-text-fill-color:transparent;
  }

  .hero-sub {
    font-size:1rem; color:var(--silver-dim);
    max-width:500px; line-height:1.8; margin-bottom:3rem;
    opacity:0; transform:translateY(20px);
    animation:fadeUp 0.9s 0.4s ease forwards; position:relative; z-index:1;
  }

  .hero-btns {
    display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;
    opacity:0; transform:translateY(20px);
    animation:fadeUp 0.9s 0.6s ease forwards; position:relative; z-index:1;
  }

  .btn-primary {
    padding:0.8rem 2.2rem; background:var(--white); color:var(--black);
    border:none; border-radius:16px;
    font-family:'Tajawal',sans-serif; font-size:0.9rem; font-weight:700;
    letter-spacing:0.05em; cursor:pointer; transition:transform 0.2s, box-shadow 0.2s;
    display:inline-flex; align-items:center; gap:0.5rem;
  }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(255,255,255,0.2); }

  .btn-outline {
    padding:0.8rem 2.2rem; background:transparent; color:var(--silver);
    border:1px solid var(--border); border-radius:16px;
    font-family:'Tajawal',sans-serif; font-size:0.9rem; font-weight:500;
    letter-spacing:0.05em; cursor:pointer; transition:border-color 0.2s, color 0.2s;
  }
  .btn-outline:hover { border-color:var(--silver); color:var(--white); }

  .scroll-indicator {
    position:absolute; bottom:2.5rem; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:0.5rem;
    color:var(--silver-dim); font-size:0.7rem; letter-spacing:0.2em;
    animation:bounce 2s infinite; z-index:1;
  }
  @keyframes bounce {
    0%,100% { transform:translateX(-50%) translateY(0); }
    50%      { transform:translateX(-50%) translateY(6px); }
  }
  .scroll-line { width:1px; height:40px; background:linear-gradient(to bottom,var(--silver-dim),transparent); }

  /* ── SECTIONS ── */
  section {
    padding:8rem 8%; position:relative; z-index:2;
    opacity:0; transform:translateY(30px); transition:opacity 0.7s, transform 0.7s;
  }
  section.visible { opacity:1; transform:translateY(0); }

  .section-header { margin-bottom:4rem; }
  .section-tag {
    font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase;
    color:var(--silver-dim); margin-bottom:1rem;
    display:flex; align-items:center; gap:0.8rem;
  }
  .section-tag::before { content:''; width:30px; height:1px; background:var(--silver-dim); }
  .section-title {
    font-family:'Cinzel',serif;
    font-size:clamp(1.8rem,4vw,3rem); font-weight:700;
    background:linear-gradient(135deg,#fff 0%,#999 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    line-height:1.1;
  }

  /* ── MARQUEE ── */
  .marquee-wrap {
    overflow:hidden;
    border-top:1px solid var(--border); border-bottom:1px solid var(--border);
    padding:1rem 0; background:#050505; position:relative; z-index:2;
  }
  .marquee-track { display:flex; gap:3rem; animation:marquee 20s linear infinite; white-space:nowrap; }
  .marquee-item {
    font-family:'Cinzel',serif; font-size:0.75rem;
    letter-spacing:0.25em; color:var(--silver-dim); text-transform:uppercase;
    display:flex; align-items:center; gap:1.5rem; flex-shrink:0;
  }
  .marquee-dot { width:4px; height:4px; background:var(--silver-dim); border-radius:50%; }
  @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* ── WORKS ── */
  .works-filter { display:flex; gap:0.5rem; margin-bottom:3rem; flex-wrap:wrap; }
  .filter-btn {
    padding:0.5rem 1.4rem; border:1px solid var(--border); background:transparent;
    color:var(--silver-dim); font-family:'Tajawal',sans-serif; font-size:0.85rem;
    border-radius:100px; cursor:pointer; transition:all 0.2s;
  }
  .filter-btn.active,.filter-btn:hover { background:var(--white); color:var(--black); border-color:var(--white); }

  .works-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px;
  }
  .work-card {
    aspect-ratio:4/3; position:relative; overflow:hidden;
    border-radius:20px; background:#111; cursor:pointer;
    border:1px solid var(--border); transition:border-color 0.3s, transform 0.3s;
  }
  .work-card:hover { border-color:rgba(200,200,200,0.35); transform:translateY(-5px); }
  .work-card-inner {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem;
    transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .work-card:hover .work-card-inner { transform:scale(1.06); }
  .work-icon-svg { opacity:0.6; transition:opacity 0.3s; width:100%; height:100%; object-fit:cover; }
  .work-card:hover .work-icon-svg { opacity:1; }
  .work-card-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,transparent 60%);
    opacity:0; transition:opacity 0.3s;
    display:flex; align-items:flex-end; padding:1.5rem; flex-direction:column; align-items:flex-start;
  }
  .work-card:hover .work-card-overlay { opacity:1; }
  .work-card-label { font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--silver-dim); margin-bottom:0.3rem; }
  .work-card-name  { font-size:1.1rem; font-weight:700; color:var(--white); }
  .work-card-bg-anime   { background:linear-gradient(135deg,#0d0d0d 0%,#1a1a2e 50%,#0d0d0d 100%); }
  .work-card-bg-modern  { background:linear-gradient(135deg,#0d0d0d 0%,#1c1c1c 50%,#111 100%); }
  .work-card-bg-classic { background:linear-gradient(135deg,#0d0d0d 0%,#1a1a14 50%,#0d0d0d 100%); }

  /* ── PRICES ── */
  .prices-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px;
  }
  .price-card {
    background:rgba(13,13,13,0.9); backdrop-filter:blur(10px);
    padding:2.5rem 2rem; border-radius:22px;
    border:1px solid var(--border);
    position:relative; transition:border-color 0.3s, transform 0.3s;
  }
  .price-card:hover { border-color:rgba(200,200,200,0.3); transform:translateY(-5px); }
  .price-card.featured { background:rgba(18,18,18,0.95); border-color:rgba(200,200,200,0.25); }
  .price-card.featured::before {
    content:'الأكثر طلباً';
    position:absolute; top:-1px; right:2rem;
    background:var(--white); color:var(--black);
    font-size:0.7rem; font-weight:700; letter-spacing:0.1em;
    padding:0.3rem 0.8rem; border-radius:0 0 12px 12px;
  }
  .price-tier   { font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--silver-dim); margin-bottom:1rem; }
  .price-name   { font-family:'Cinzel',serif; font-size:1.4rem; font-weight:700; color:var(--white); margin-bottom:0.5rem; }
  .price-amount { font-size:2.5rem; font-weight:900; color:var(--white); line-height:1; margin-bottom:0.3rem; }
  .price-amount span { font-size:1rem; font-weight:400; color:var(--silver-dim); }
  .price-currency { font-size:0.85rem; color:var(--silver-dim); margin-bottom:2rem; }
  .price-divider { width:100%; height:1px; background:var(--border); margin-bottom:1.5rem; }
  .price-features { list-style:none; display:flex; flex-direction:column; gap:0.8rem; margin-bottom:2rem; }
  .price-features li { display:flex; align-items:center; gap:0.7rem; font-size:0.9rem; color:var(--silver); }
  .price-features li::before { content:''; width:4px; height:4px; background:var(--silver-dim); border-radius:50%; flex-shrink:0; }
  .price-btn {
    width:100%; padding:0.8rem; border:1px solid var(--border); background:transparent;
    color:var(--silver); font-family:'Tajawal',sans-serif; font-size:0.9rem; font-weight:600;
    cursor:pointer; transition:all 0.2s; letter-spacing:0.05em; border-radius:14px;
  }
  .price-btn:hover { background:var(--white); color:var(--black); border-color:var(--white); }
  .price-card.featured .price-btn { background:var(--white); color:var(--black); border-color:var(--white); }
  .price-card.featured .price-btn:hover { background:var(--silver); border-color:var(--silver); }

  /* ── ABOUT ── */
  #about {
    display:grid; grid-template-columns:1fr 1fr; gap:6rem;
    align-items:center; padding:8rem 8%;
  }
  .about-visual { position:relative; height:400px; }
  .about-box { position:absolute; border:1px solid var(--border); border-radius:18px; }
  .about-box-1 { width:220px; height:220px; top:0; right:0; background:#0d0d0d; display:flex; align-items:center; justify-content:center; animation:floatBox 6s ease-in-out infinite; }
  .about-box-2 { width:160px; height:160px; bottom:40px; right:60px; background:#111; display:flex; align-items:center; justify-content:center; animation:floatBox 6s 2s ease-in-out infinite; }
  .about-box-3 { width:100px; height:100px; top:60px; right:280px; border-color:rgba(200,200,200,0.08); animation:floatBox 6s 4s ease-in-out infinite; }
  @keyframes floatBox { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .stat-row { display:flex; gap:2rem; margin-top:2.5rem; flex-wrap:wrap; }
  .stat { border-right:1px solid var(--border); padding-right:1.2rem; }
  .stat-num { font-family:'Cinzel',serif; font-size:2rem; font-weight:900; color:var(--white); line-height:1; }
  .stat-label { font-size:0.8rem; color:var(--silver-dim); margin-top:0.3rem; letter-spacing:0.1em; }

  /* ── PAYMENT ── */
  .payment-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:16px; margin-top:3rem;
  }
  .payment-card {
    background:rgba(13,13,13,0.9); backdrop-filter:blur(10px);
    padding:2.5rem 2rem; border-radius:22px;
    border:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; gap:1rem;
    transition:border-color 0.3s, transform 0.3s; text-align:center;
  }
  .payment-card:hover { border-color:rgba(200,200,200,0.3); transform:translateY(-5px); }
  .payment-icon-svg { opacity:0.75; transition:opacity 0.3s; }
  .payment-card:hover .payment-icon-svg { opacity:1; }
  .payment-name { font-family:'Cinzel',serif; font-size:1rem; font-weight:700; color:var(--white); }
  .payment-desc { font-size:0.8rem; color:var(--silver-dim); line-height:1.5; }
  .payment-badge {
    padding:0.3rem 0.8rem; border:1px solid var(--border);
    border-radius:100px; font-size:0.65rem; letter-spacing:0.15em;
    color:var(--silver-dim); text-transform:uppercase;
  }

  /* ── CTA ── */
  .discord-cta {
    background:transparent; padding:6rem 8%; text-align:center;
    position:relative; z-index:2; overflow:hidden;
  }
  .discord-cta::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(180,180,180,0.04) 0%,transparent 70%);
  }
  .cta-title {
    font-family:'Cinzel',serif; font-size:clamp(2rem,5vw,4rem); font-weight:900;
    background:linear-gradient(135deg,#fff 0%,#888 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:1rem;
  }
  .cta-sub { color:var(--silver-dim); font-size:1rem; margin-bottom:2.5rem; }

  /* ── FOOTER ── */
  footer {
    padding:4rem 8%; border-top:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:1.5rem; position:relative; z-index:2;
  }
  .footer-logo { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:900; background:linear-gradient(135deg,#fff 0%,#666 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .footer-links { display:flex; gap:2rem; list-style:none; flex-wrap:wrap; }
  .footer-links a { text-decoration:none; color:var(--silver-dim); font-size:0.85rem; transition:color 0.2s; }
  .footer-links a:hover { color:var(--white); }
  .footer-copy { font-size:0.75rem; color:rgba(136,136,136,0.5); letter-spacing:0.1em; }

  @media (max-width:768px) {
    #about { grid-template-columns:1fr; }
    .about-visual { display:none; }
    footer { flex-direction:column; text-align:center; }
    .footer-links { justify-content:center; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- NAV -->
<nav>
  <div class="logo">Be come..</div>
  <ul class="nav-links">
